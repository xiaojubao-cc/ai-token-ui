# ==============================================
# AI Token UI - Nginx 配置文件
# ==============================================
# 使用方法：
#   1. 复制此文件到服务器：/etc/nginx/sites-available/ai-token-ui
#   2. 创建软链接启用：  sudo ln -s /etc/nginx/sites-available/ai-token-ui /etc/nginx/sites-enabled/
#   3. 测试配置：        sudo nginx -t
#   4. 重载 Nginx：       sudo nginx -s reload
# ==============================================

server {
    # 监听 80 端口（HTTP）
    listen 80;
    # 改为你的域名或服务器 IP
    server_name your-domain.com;

    # 前端文件存放目录
    root /var/www/ai-token-ui;
    index index.html;

    # ---------- Gzip 压缩，让页面加载更快 ----------
    gzip on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ---------- JS/CSS 文件（文件名带 hash，可以长期缓存）----------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---------- 后端 API 转发 ----------
    # 所有 /api/xxx 请求转发到后端 Java 服务
    location /api/ {
        # 改为你的后端服务地址
        proxy_pass http://127.0.0.1:8080;

        # 把客户端真实 IP 传给后端
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时时间 60 秒
        proxy_read_timeout 60s;
    }

    # ---------- 前端路由（SPA 模式）----------
    # Vue Router 使用 HTML5 History 模式，直接访问 /admin/dashboard 时
    # 服务器上没有这个文件，需要返回 index.html 让前端处理路由
    location / {
        try_files $uri $uri/ /index.html;
    }
}
